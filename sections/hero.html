<section id="hero" class="relative min-h-screen overflow-hidden">
  <canvas id="heroCanvas" class="absolute inset-0 w-full h-full"></canvas>

  <!-- OVERLAY CONTENT -->
  <div class="relative z-10 h-screen flex items-center">
    <div class="max-w-7xl mx-auto px-6 grid lg:grid-cols-2 gap-16 items-center text-white">
      <div>
        <h1 class="text-6xl xl:text-7xl font-bold tracking-tight">
          AIMentool
        </h1>
        <p class="mt-6 text-xl text-white/80 max-w-xl">
          Fresh Thinking. Automated Growth.
        </p>
      </div>
    </div>
  </div>
</section>

<script>
const canvas = document.getElementById("heroCanvas");
const ctx = canvas.getContext("2d");

let w, h;
function resize() {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

/* PARTICLES */
const nodes = Array.from({ length: 80 }, () => ({
  x: Math.random() * w,
  y: Math.random() * h,
  vx: (Math.random() - 0.5) * 0.3,
  vy: (Math.random() - 0.5) * 0.3
}));

/* GRAPH POINTS */
let graph = Array.from({ length: 40 }, (_, i) => ({
  x: i / 39,
  y: Math.random() * 0.4 + 0.4
}));

let t = 0;

function drawBackground() {
  const g = ctx.createLinearGradient(0, 0, w, h);
  g.addColorStop(0, "#1f6f5f");
  g.addColorStop(0.5, "#2f8a8a");
  g.addColorStop(1, "#1e3a5f");
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, w, h);
}

function drawNetwork() {
  ctx.strokeStyle = "rgba(255,255,255,0.25)";
  nodes.forEach((a, i) => {
    nodes.forEach((b, j) => {
      const d = Math.hypot(a.x - b.x, a.y - b.y);
      if (d < 140) {
        ctx.globalAlpha = 1 - d / 140;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
      }
    });
  });

  ctx.globalAlpha = 1;
  nodes.forEach(n => {
    ctx.beginPath();
    ctx.arc(n.x, n.y, 2, 0, Math.PI * 2);
    ctx.fillStyle = "#ffffff";
    ctx.fill();
  });
}

function drawGraph() {
  ctx.save();
  ctx.translate(w * 0.35, h * 0.65);

  ctx.beginPath();
  ctx.moveTo(0, 0);

  graph.forEach((p, i) => {
    const x = p.x * w * 0.5;
    const y = -p.y * h * 0.45 + Math.sin(t + i * 0.3) * 10;
    ctx.lineTo(x, y);
  });

  ctx.strokeStyle = "rgba(180,255,230,0.9)";
  ctx.lineWidth = 3;
  ctx.shadowBlur = 25;
  ctx.shadowColor = "rgba(180,255,230,0.9)";
  ctx.stroke();

  graph.forEach((p, i) => {
    const x = p.x * w * 0.5;
    const y = -p.y * h * 0.45;
    ctx.beginPath();
    ctx.arc(x, y, 4, 0, Math.PI * 2);
    ctx.fillStyle = "#ffffff";
    ctx.fill();
  });

  ctx.restore();
}

function animate() {
  ctx.clearRect(0, 0, w, h);
  drawBackground();

  nodes.forEach(n => {
    n.x += n.vx;
    n.y += n.vy;
    if (n.x < 0 || n.x > w) n.vx *= -1;
    if (n.y < 0 || n.y > h) n.vy *= -1;
  });

  drawNetwork();
  drawGraph();

  t += 0.01;
  requestAnimationFrame(animate);
}

animate();
</script>
