<section id="hero" class="relative min-h-screen overflow-hidden flex items-center text-white">
  <!-- BACKGROUND GRADIENT -->
  <div class="absolute inset-0 bg-gradient-to-br from-[#1f6f5f] via-[#2f7f88] to-[#1e3a5f]"></div>

  <!-- VIGNETTE / LIGHT BLOOM -->
  <div class="absolute inset-0 pointer-events-none">
    <div class="absolute -top-40 -left-40 w-[600px] h-[600px] bg-white/30 rounded-full blur-[160px]"></div>
    <div class="absolute bottom-[-300px] right-[-200px] w-[700px] h-[700px] bg-white/20 rounded-full blur-[180px]"></div>
  </div>

  <!-- GRID OVERLAY -->
  <div class="absolute inset-0 opacity-[0.07] bg-[linear-gradient(to_right,rgba(255,255,255,.3)_1px,transparent_1px),linear-gradient(to_bottom,rgba(255,255,255,.3)_1px,transparent_1px)] bg-[size:40px_40px]"></div>

  <!-- CONTENT -->
  <div class="relative z-10 max-w-7xl mx-auto px-6 grid lg:grid-cols-2 gap-16 items-center">

    <!-- LEFT TEXT -->
    <div data-aos="fade-right">
      <h1 class="text-5xl md:text-6xl xl:text-7xl font-bold tracking-tight">
        AIMentool
      </h1>
      <p class="mt-6 text-xl text-white/80 max-w-xl">
        Fresh Thinking. Automated Growth.
      </p>
    </div>

    <!-- RIGHT VISUAL -->
    <div class="relative flex justify-center items-center" data-aos="fade-left">

      <!-- GRAPH BASE -->
      <svg viewBox="0 0 600 400" class="w-full max-w-[520px]">
        <!-- Bars -->
        <g fill="rgba(255,255,255,0.18)">
          <rect x="80" y="260" width="30" height="100"/>
          <rect x="140" y="230" width="30" height="130"/>
          <rect x="200" y="200" width="30" height="160"/>
          <rect x="260" y="170" width="30" height="190"/>
          <rect x="320" y="130" width="30" height="230"/>
        </g>

        <!-- Curve -->
        <path d="M80 260 C150 220, 220 210, 300 160 S420 90, 520 70"
              fill="none"
              stroke="rgba(255,255,255,0.7)"
              stroke-width="3"/>

        <!-- Nodes -->
        <g fill="white">
          <circle cx="80" cy="260" r="4"/>
          <circle cx="200" cy="210" r="4"/>
          <circle cx="300" cy="160" r="4"/>
          <circle cx="420" cy="110" r="4"/>
          <circle cx="520" cy="70" r="4"/>
        </g>
      </svg>

      <!-- AI NETWORK -->
      <div class="absolute left-24 top-32 w-40 h-40 animate-float-slow">
        <svg viewBox="0 0 200 200">
          <g stroke="rgba(255,255,255,0.6)" stroke-width="1">
            <line x1="100" y1="20" x2="30" y2="100"/>
            <line x1="100" y1="20" x2="170" y2="100"/>
            <line x1="30" y1="100" x2="100" y2="180"/>
            <line x1="170" y1="100" x2="100" y2="180"/>
          </g>
          <g fill="white">
            <circle cx="100" cy="20" r="4"/>
            <circle cx="30" cy="100" r="4"/>
            <circle cx="170" cy="100" r="4"/>
            <circle cx="100" cy="180" r="4"/>
          </g>
        </svg>
      </div>

      <!-- LEAF -->
      <div class="absolute right-8 top-8 w-48 animate-float-medium">
        <svg viewBox="0 0 200 300">
          <path d="M100 10 C160 80,160 200,100 290 C40 200,40 80,100 10Z"
                fill="none"
                stroke="rgba(255,255,255,0.8)"
                stroke-width="2"/>
          <line x1="100" y1="10" x2="100" y2="290" stroke="rgba(255,255,255,0.5)"/>
        </svg>
      </div>

    </div>
  </div>
</section>

<style>
@keyframes floatSlow {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-30px); }
}
@keyframes floatMedium {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-45px); }
}
.animate-float-slow { animation: floatSlow 14s ease-in-out infinite; }
.animate-float-medium { animation: floatMedium 10s ease-in-out infinite; }
</style>
