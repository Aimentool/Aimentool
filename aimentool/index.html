<!DOCTYPE html>
<html lang="hu" class="scroll-smooth">
<head>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <script>
        tailwind.config = {

            }

    <link rel="stylesheet" href="css/base.css">

<body class="antialiased">

    <nav class="fixed w-full z-50 border-b border-white/5 bg-[#05080A]/80 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="text-xl font-bold tracking-wider text-white">AIMen<span class="text-brand-menthol">tool</span></span>
            </div>
            <div class="hidden md:flex items-center space-x-8 text-sm font-semibold tracking-widest uppercase text-gray-400">
                <a href="#szolgaltatasok" class="hover:text-brand-menthol transition-colors">Modulok</a>
                <a href="#arazas" class="hover:text-brand-menthol transition-colors">Árak</a>
                <a href="#info-hub" class="hover:text-brand-menthol transition-colors">Info Hub</a>

    <main>
        </main>

            <div class="flex gap-6 text-[10px] font-bold uppercase tracking-widest text-gray-500">
                <button onclick="openModal('aszf')" class="hover:text-white">ÁSZF</button>

            <h2 id="modalTitle" class="text-2xl font-bold text-brand-menthol mb-6"></h2>
            <div id="modalBody" class="text-gray-400 text-sm leading-loose"></div>
        </div>
    </div>
