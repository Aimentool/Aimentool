<section class="relative min-h-screen flex items-center pt-20 overflow-hidden">
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-brand-menthol/10 rounded-full blur-[100px] pointer-events-none"></div>

    <div class="max-w-7xl mx-auto px-6 w-full grid lg:grid-cols-2 gap-12 items-center relative z-10">
        <div data-aos="fade-right">
            <div class="inline-flex items-center gap-2 px-3 py-1 mb-6 border border-brand-menthol/20 rounded-full bg-brand-menthol/5 backdrop-blur-sm">
                <span class="w-1.5 h-1.5 rounded-full bg-brand-menthol animate-pulse"></span>
                <span class="text-xs font-bold text-brand-menthol tracking-widest uppercase">System v2.5 Online</span>
            </div>
            
            <h1 class="text-5xl lg:text-7xl font-bold leading-tight mb-6 text-white">
                AIMentool <br>
                <span class="text-gradient text-4xl lg:text-6xl">Fresh Thinking.</span>
            </h1>
            
            <p class="text-lg text-gray-400 mb-8 max-w-lg leading-relaxed">
                Nem marketing hype. Egy komplett rendszer, amely átveszi a rutint, kezeli az ügyfeleket és skálázza a vállalkozását.
                <br><strong class="text-brand-menthol">Tisztaság. Kontroll. AI.</strong>
            </p>
            
            <div class="flex flex-wrap gap-4">
                <a href="#arazas" class="px-8 py-4 bg-brand-menthol text-brand-dark font-bold rounded-xl hover:shadow-[0_0_25px_rgba(119,215,185,0.4)] transition-all">
                    Rendszer indítása
                </a>
                <a href="#info-hub" class="px-8 py-4 border border-white/10 hover:bg-white/5 hover:border-brand-menthol/50 transition-all font-bold rounded-xl text-white">
                    Hogyan működik?
                </a>
            </div>
        </div>

        <div class="flex justify-center items-center" data-aos="zoom-in" data-aos-duration="1200">
            <svg width="520" height="420" viewBox="0 0 520 420" xmlns="http://www.w3.org/2000/svg" class="ai-leaf w-full h-auto max-w-[500px]">
              <defs>
                <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
                  <feGaussianBlur stdDeviation="6" result="blur"/>
                  <feMerge>
                    <feMergeNode in="blur"/>
                    <feMergeNode in="SourceGraphic"/>
                  </feMerge>
                </filter>
                <linearGradient id="sweep" x1="0%" y1="0%" x2="100%" y2="0%">
                  <stop offset="0%" stop-color="rgba(255,255,255,0)"/>
                  <stop offset="50%" stop-color="rgba(180,255,230,0.35)"/>
                  <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
                </linearGradient>
              </defs>

              <path d="M260 40 C360 90 420 170 420 260 C420 340 350 380 260 380 C170 380 100 340 100 260 C100 170 160 90 260 40 Z"
                    stroke="#9ff5d2" stroke-width="1.5" fill="none"
                    filter="url(#softGlow)" class="leaf-outline"/>

              <path d="M260 60 L260 360" stroke="#7fecc5" stroke-width="1" opacity="0.6"/>
              <path d="M260 120 C300 150 330 190 350 240" stroke="#7fecc5" stroke-width="0.8" opacity="0.5"/>
              <path d="M260 120 C220 150 190 190 170 240" stroke="#7fecc5" stroke-width="0.8" opacity="0.5"/>

              <g class="nodes">
                <circle cx="260" cy="160" r="3" fill="#b9ffe6"/>
                <circle cx="300" cy="200" r="2.5" fill="#b9ffe6"/>
                <circle cx="220" cy="220" r="2.5" fill="#b9ffe6"/>
                <circle cx="260" cy="260" r="3" fill="#b9ffe6"/>
              </g>

              <rect x="-520" y="0" width="520" height="420"
                    fill="url(#sweep)" class="light-sweep"/>

              <style>
                .leaf-outline{stroke-dasharray:1200;stroke-dashoffset:1200;animation:draw 2.4s ease-out forwards}
                .nodes circle{animation:pulse 3.2s ease-in-out infinite}
                .nodes circle:nth-child(2){animation-delay:.6s}
                .nodes circle:nth-child(3){animation-delay:1.2s}
                .nodes circle:nth-child(4){animation-delay:1.8s}
                .light-sweep{animation:sweep 6s ease-in-out infinite;opacity:.35}
                @keyframes draw{to{stroke-dashoffset:0}}
                @keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
                @keyframes sweep{from{transform:translateX(-520px)}to{transform:translateX(520px)}}
                @media(prefers-reduced-motion:reduce){*{animation:none}}
              </style>
            </svg>
        </div>
    </div>
</section>
